<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Encryption System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --bg-color: #f0f9ff;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-light: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(2, 132, 199, 0.08) 1px, transparent 1px),
            linear-gradient(90deg, rgba(2, 132, 199, 0.08) 1px, transparent 1px);
            background-size: 24px 24px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text-dark); padding: 20px;
        }
        .hero-card {
            background: var(--card-bg); padding: 3rem 2rem; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(2, 132, 199, 0.1);
            text-align: center; max-width: 500px; width: 100%;
            border-top: 5px solid var(--primary);
        }
        .icon { font-size: 4rem; margin-bottom: 1rem; color: var(--primary); }
        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 1rem; }
        p { color: var(--text-light); line-height: 1.6; margin-bottom: 2rem; }
        .btn {
            display: inline-block; background: var(--primary); color: white;
            padding: 0.8rem 2rem; border-radius: 8px; text-decoration: none;
            font-weight: 600; transition: all 0.2s;
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2); }
    </style>
</head>
<body>
    <div class="hero-card">
        <div class="icon">🛡️</div>
        <h1>Secure File Encryption System</h1>
        <p>Your files are protected with military-grade <strong>AES</strong> and <strong>RSA</strong> encryption. Safe, reliable, and entirely yours.</p>
        <a href="/login" class="btn">Get Started</a>
    </div>
</body>
</html>
