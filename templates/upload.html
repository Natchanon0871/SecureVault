<!DOCTYPE html>
<html>

<head>
    <title>Upload File</title>
</head>

<body>

    {% with messages = get_flashed_messages() %}

    {% if messages %}

    {% for message in messages %}

    <p>{{ message }}</p>

    {% endfor %}

    {% endif %}

    {% endwith %}

    <h1>Upload File</h1>

    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="file">

        <br><br>

        <button type="submit">
            Upload & Encrypt
        </button>

    </form>

</body>

</html>
