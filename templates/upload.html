<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root {
            --primary: #0284c7; --primary-hover: #0369a1; --bg-color: #f0f9ff;
            --card-bg: #ffffff; --text-dark: #0f172a; --text-light: #64748b; --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--bg-color); background-image: linear-gradient(rgba(2, 132, 199, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(2, 132, 199, 0.08) 1px, transparent 1px);
            background-size: 24px 24px; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }
        .card {
            background: var(--card-bg); padding: 2.5rem; border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); width: 100%; max-width: 450px; border-top: 4px solid var(--primary); text-align: center;
        }
        h1 { color: var(--text-dark); margin-bottom: 0.5rem; font-size: 1.5rem; }
        p.subtitle { color: var(--text-light); margin-bottom: 2rem; font-size: 0.9rem; }
        .flash-message { background: #e0f2fe; color: #0369a1; padding: 0.8rem; border-radius: 6px; font-size: 0.9rem; margin-bottom: 1.5rem; border-left: 4px solid var(--primary); }
        .file-upload-wrapper { border: 2px dashed var(--border); border-radius: 8px; padding: 2rem; margin-bottom: 1.5rem; background: #f8fafc; transition: border 0.2s; }
        .file-upload-wrapper:hover { border-color: var(--primary); }
        input[type="file"] { width: 100%; color: var(--text-dark); font-size: 0.9rem; }
        input[type="file"]::file-selector-button {
            background: #e0f2fe; color: var(--primary); border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 500; margin-right: 1rem; transition: background 0.2s;
        }
        input[type="file"]::file-selector-button:hover { background: #bae6fd; }
        button[type="submit"] {
            width: 100%; background: var(--primary); color: white; border: none; border-radius: 8px; padding: 0.8rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        button[type="submit"]:hover { background: var(--primary-hover); }
        .back-link { display: inline-block; margin-top: 1.5rem; color: var(--text-light); text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: var(--primary); text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Secure Upload</h1>
        <p class="subtitle">Select a file to encrypt and store</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-message">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">
            <div class="file-upload-wrapper">
                <input type="file" name="file" required>
            </div>
            <button type="submit">🔒 Upload & Encrypt</button>
        </form>

        <a href="/" class="back-link">← Back to Dashboard</a>
    </div>
</body>
</html>
